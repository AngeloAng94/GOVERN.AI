version: '3.8'

services:
  mongodb:
    image: mongo:7.0
    container_name: governai_mongodb
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
    environment:
      MONGO_INITDB_DATABASE: governai_db
    networks:
      - governai_network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: governai_backend
    restart: unless-stopped
    ports:
      - "8001:8001"
    env_file:
      - ./backend/.env
    environment:
      - MONGO_URL=mongodb://mongodb:27017
      - DB_NAME=governai_db
    depends_on:
      - mongodb
    networks:
      - governai_network
    volumes:
      - ./backend:/app

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: governai_frontend
    restart: unless-stopped
    ports:
      - "3000:3000"
    env_file:
      - ./frontend/.env
    depends_on:
      - backend
    networks:
      - governai_network

volumes:
  mongodb_data:
    driver: local

networks:
  governai_network:
    driver: bridge
